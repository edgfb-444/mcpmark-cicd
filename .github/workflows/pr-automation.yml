name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Run ESLint code analysis
        id: eslint-check
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier formatting validation
        id: prettier-check
        run: npx prettier --check .
        continue-on-error: true

      - name: Post Code Quality Report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const eslintResults = `${{ steps.eslint-check.outputs.stdout || steps.eslint-check.outputs.stderr }}`;
            const prettierResults = `${{ steps.prettier-check.outputs.stdout || steps.prettier-check.outputs.stderr }}`;
            
            const commentBody = `
            ## Code Quality Report
            ### ESLint Analysis Results:
            \`\`\`
            ${eslintResults || "No ESLint issues detected."}
            \`\`\`
            
            ### Prettier Formatting Results:
            \`\`\`
            ${prettierResults || "No Prettier formatting issues detected."}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody.trim()
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: test-run
        run: npm test -- --coverage
        continue-on-error: true

      - name: Post Test Coverage Report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const testCoverageResults = `${{ steps.test-run.outputs.stdout || steps.test-run.outputs.stderr }}`;
            
            const commentBody = `
            ## Test Coverage Report
            \`\`\`
            ${testCoverageResults || "Test coverage report could not be generated."}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody.trim()
            });

      - name: Upload coverage report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/
          if-no-files-found: warn

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Run dependency vulnerability audit
        id: dependency-audit
        run: npm audit --json
        continue-on-error: true

      - name: Scan for secrets in code changes
        id: secret-scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --path=. --report=secrets-scan-results.json
        continue-on-error: true

      - name: Post Security Scan Report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const vulnerabilityResults = `${{ steps.dependency-audit.outputs.stdout || steps.dependency-audit.outputs.stderr }}`;
            const secretScanResults = `${{ steps.secret-scan.outputs.stdout || steps.secret-scan.outputs.stderr }}`;
            
            const commentBody = `
            ## Security Scan Report
            ### Dependencies Vulnerabilities:
            \`\`\`
            ${vulnerabilityResults || "No dependency vulnerabilities detected."}
            \`\`\`
            
            ### Secrets Scan Results:
            \`\`\`
            ${secretScanResults || "No secrets detected in code changes."}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody.trim()
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Build the application
        id: app-build
        run: npm run build
        continue-on-error: true

      - name: Validate application endpoints (placeholder)
        id: endpoint-validation
        run: |
          # Replace with your actual endpoint validation logic
          # Example: Start the app and test endpoints with curl/postman
          echo "Endpoint validation: Placeholder (update with your app's endpoint checks)"
        continue-on-error: true

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/ # Update path to your app's build output directory
          if-no-files-found: warn

      - name: Post Build Validation Status as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const buildResults = `${{ steps.app-build.outputs.stdout || steps.app-build.outputs.stderr }}`;
            const endpointResults = `${{ steps.endpoint-validation.outputs.stdout || steps.endpoint-validation.outputs.stderr }}`;
            
            const commentBody = `
            ## Build Validation
            ### Application Build Status:
            \`\`\`
            ${buildResults || "Application build completed successfully."}
            \`\`\`
            
            ### Endpoint Validation Results:
            \`\`\`
            ${endpointResults || "Endpoint validation completed (placeholder - update with your checks)."}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody.trim()
            });